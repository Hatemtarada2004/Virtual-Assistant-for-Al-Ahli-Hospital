<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - المستشفى الأهلي</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../public/assets/css/main.css" rel="stylesheet">
  <link href="../public/assets/css/chatbot.css" rel="stylesheet">
</head>
<body>
  <header class="ahli-navbar">
    <a href="index.html" class="brand"><i class="fas fa-hospital-alt"></i> المستشفى الأهلي</a>
    <nav class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="login.html">تسجيل الدخول</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="auth-shell">
      <div class="auth-card">
        <p class="auth-eyebrow">تسجيل مريض جديد</p>
        <h1>إنشاء حساب جديد</h1>
        <p class="auth-copy">بيانات المريض أصبحت أبسط: اسم مستخدم وبريد إلكتروني وكلمة مرور فقط.</p>
        <form id="register-form" class="auth-form">
          <label>اسم المستخدم
            <input name="username" type="text" required placeholder="مثال: patient_1">
          </label>
          <label>البريد الإلكتروني
            <input name="email" type="email" required placeholder="name@example.com">
          </label>
          <label>كلمة المرور
            <input name="password" type="password" required placeholder="8 أحرف أو أكثر">
          </label>
          <button type="submit" class="btn-hero-primary">إنشاء الحساب</button>
        </form>
        <p id="auth-message" class="auth-message"></p>
        <p class="auth-switch">لديك حساب بالفعل؟ <a href="login.html">سجل الدخول</a></p>
      </div>
    </section>
  </main>

  <script>
  const API_BASE = (() => {
    const m = location.pathname.match(/^(\/[^/]+\/)/);
    return m ? `${location.protocol}//${location.host}${m[1]}public` : 'http://localhost/Hospital/public';
  })();

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = Object.fromEntries(new FormData(e.target).entries());
    const msg = document.getElementById('auth-message');
    msg.textContent = 'جارٍ إنشاء الحساب...';
    msg.className = 'auth-message';

    try {
      const res = await fetch(`${API_BASE}/api/auth/register`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message || 'فشل إنشاء الحساب');
      msg.textContent = `تم إنشاء الحساب بنجاح للمستخدم ${json.data.username}.`;
      msg.className = 'auth-message success';
      setTimeout(() => location.href = 'index.html', 1000);
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'auth-message error';
    }
  });
  </script>
  <script src="../public/assets/js/chatbot.js?v=20260518-no-auth"></script>
</body>
</html>
