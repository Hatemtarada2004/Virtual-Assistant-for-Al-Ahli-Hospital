<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول الطبيب - المستشفى الأهلي</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../public/assets/css/main.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d6efd11, #19875411); min-height: 100vh; }
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 70px); padding: 2rem 1rem; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); padding: 2.5rem 2rem; width: 100%; max-width: 420px; }
    .login-card .icon-wrap { text-align: center; margin-bottom: 1.2rem; }
    .login-card .icon-wrap i { font-size: 3rem; color: #0d6efd; }
    .login-card h1 { text-align: center; font-size: 1.5rem; margin-bottom: .3rem; color: #1a2e4a; }
    .login-card p.sub { text-align: center; color: #6c757d; font-size: .9rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: .4rem; color: #344; }
    .form-group input { width: 100%; padding: .7rem 1rem; border: 1.5px solid #dee2e6; border-radius: 8px; font-size: .97rem; font-family: inherit; box-sizing: border-box; transition: border-color .2s; }
    .form-group input:focus { outline: none; border-color: #0d6efd; }
    .btn-login { width: 100%; padding: .8rem; background: #0d6efd; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    .btn-login:hover { background: #0b5ed7; }
    .btn-login:disabled { background: #6c757d; cursor: not-allowed; }
    .alert { padding: .7rem 1rem; border-radius: 8px; margin-top: 1rem; font-size: .9rem; display: none; }
    .alert-danger { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .alert-success { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .default-info { background: #e8f4fd; border: 1px solid #b6d4fe; border-radius: 8px; padding: .8rem 1rem; margin-top: 1rem; font-size: .85rem; color: #084298; }
    .default-info strong { display: block; margin-bottom: .3rem; }
  </style>
</head>
<body>
  <header class="ahli-navbar">
    <a href="index.html" class="brand"><i class="fas fa-hospital-alt"></i> المستشفى الأهلي</a>
    <nav class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="login.html">دخول المريض</a>
    </nav>
  </header>

  <div class="login-wrap">
    <div class="login-card">
      <div class="icon-wrap"><i class="fas fa-user-md"></i></div>
      <h1>بوابة الأطباء</h1>
      <p class="sub">سجّل دخولك باستخدام البريد الإلكتروني وكلمة المرور</p>

      <form id="login-form">
        <div class="form-group">
          <label><i class="fas fa-envelope" style="color:#0d6efd"></i> البريد الإلكتروني</label>
          <input type="email" id="email" required placeholder="doctor@ahli.org" autocomplete="email">
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock" style="color:#0d6efd"></i> كلمة المرور</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="btn-login">
          <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
        </button>
        <div id="alert" class="alert"></div>
      </form>

      <div class="default-info">
        <strong><i class="fas fa-info-circle"></i> كلمة المرور الافتراضية:</strong>
        جميع الأطباء: <code>Doctor@123</code> — يرجى تغييرها بعد أول دخول
      </div>
    </div>
  </div>

  <script>
    const BASE = (location.pathname.match(/^(\/[^/]+\/)/) || [,''])[1] + 'public';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('btn-login');
      const alert = document.getElementById('alert');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
      alert.style.display = 'none';

      try {
        const res  = await fetch(BASE + '/api/doctor/login', {
          method: 'POST', credentials: 'include',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            email:    document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();

        if (data.success) {
          alert.className = 'alert alert-success';
          alert.textContent = 'مرحباً ' + data.data.full_name + '! جاري التوجيه...';
          alert.style.display = 'block';
          setTimeout(() => location.href = 'doctor-dashboard.html', 900);
        } else {
          alert.className = 'alert alert-danger';
          alert.textContent = data.message || 'خطأ في تسجيل الدخول';
          alert.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
        }
      } catch {
        alert.className = 'alert alert-danger';
        alert.textContent = 'تعذّر الاتصال بالخادم';
        alert.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
      }
    });
  </script>
</body>
</html>
