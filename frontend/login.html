<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - المستشفى الأهلي</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="../public/assets/css/main.css" rel="stylesheet">
  <link href="../public/assets/css/chatbot.css" rel="stylesheet">
</head>
<body>
  <header class="ahli-navbar">
    <a href="index.html" class="brand"><i class="fas fa-hospital-alt"></i> المستشفى الأهلي</a>
    <nav class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="register.html">إنشاء حساب</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="auth-shell">
      <div class="auth-card">
        <p class="auth-eyebrow">حساب المريض</p>
        <h1>تسجيل الدخول</h1>
        <p class="auth-copy">أدخل اسم المستخدم وكلمة المرور للدخول إلى حسابك واستخدام الحجز الذكي داخل الموقع والشات.</p>
        <form id="login-form" class="auth-form">
          <label>اسم المستخدم
            <input name="username" type="text" required placeholder="مثال: patient_1">
          </label>
          <label>كلمة المرور
            <input name="password" type="password" required placeholder="8 أحرف أو أكثر">
          </label>
          <button type="submit" class="btn-hero-primary">دخول</button>
        </form>
        <p id="auth-message" class="auth-message"></p>
        <p class="auth-switch">لا تملك حسابًا؟ <a href="register.html">أنشئ حسابك من هنا</a></p>
      </div>
    </section>
  </main>

  <script>
  const API_BASE = (() => {
    const m = location.pathname.match(/^(\/[^/]+\/)/);
    return m ? `${location.protocol}//${location.host}${m[1]}public` : 'http://localhost/Hospital/public';
  })();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = Object.fromEntries(new FormData(e.target).entries());
    const msg = document.getElementById('auth-message');
    msg.textContent = 'جارٍ التحقق...';
    msg.className = 'auth-message';

    try {
      const res = await fetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message || 'فشل تسجيل الدخول');
      msg.textContent = `مرحبًا ${json.data.username}، تم تسجيل الدخول بنجاح.`;
      msg.className = 'auth-message success';
      setTimeout(() => location.href = 'index.html', 900);
    } catch (err) {
      msg.textContent = err.message;
      msg.className = 'auth-message error';
    }
  });
  </script>
  <script src="../public/assets/js/chatbot.js?v=20260518-no-auth"></script>
</body>
</html>
